<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Student Attendance Counter</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f4ff;
      padding: 30px;
    }
    h2 { color: #333; margin-bottom: 6px; }
    p  { color: #666; margin-bottom: 20px; font-size: 14px; }
    canvas {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      max-width: 700px;
      width: 100%;
    }
    .btns { margin-top: 20px; }
    button {
      margin: 5px;
      padding: 10px 24px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #startBtn { background: #4CAF50; color: white; }
    #resetBtn { background: #f44336; color: white; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer { margin-top: 20px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

  <h2>📊 Live Student Attendance Counter</h2>
  <p>Generates a new attendance value every 3 seconds &bull; Shows last 8 records</p>

  <canvas id="myChart"></canvas>

  <div class="btns">
    <button id="startBtn" onclick="start()">▶ Start</button>
    <button id="resetBtn" onclick="reset()">↺ Reset</button>
  </div>

  <div class="footer">SAKEC &bull; Web Technology &bull; Roll No. 32 &bull; Harsh Mange</div>

<script>
  const labels = [];
  const values = [];
  let timer = null;

  const chart = new Chart(document.getElementById('myChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Students Present',
        data: values,
        backgroundColor: 'rgba(54, 162, 235, 0.7)',
        borderColor: 'rgba(54, 162, 235, 1)',
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true,
          min: 0,
          max: 60,
          title: { display: true, text: 'No. of Students' }
        },
        x: {
          title: { display: true, text: 'Time' }
        }
      }
    }
  });

  function addData() {
    const time = new Date().toLocaleTimeString();
    const count = Math.floor(Math.random() * 51) + 10; // 10 to 60

    labels.push(time);
    values.push(count);

    if (labels.length > 8) {
      labels.shift();
      values.shift();
    }

    chart.update();
  }

  function start() {
    if (timer) return;
    addData();
    timer = setInterval(addData, 3000);
    document.getElementById('startBtn').disabled = true;
  }

  function reset() {
    clearInterval(timer);
    timer = null;
    labels.length = 0;
    values.length = 0;
    chart.update();
    document.getElementById('startBtn').disabled = false;
  }
</script>

</body>
</html>
